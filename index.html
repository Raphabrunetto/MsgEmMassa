<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Disparo de Mensagens</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>📩 Disparo de Mensagens</h2>

  <input type="file" id="imageInput" accept="image/*">

  <div class="preview" id="preview"></div>

  <textarea id="numbers" placeholder="Números (um por linha)"></textarea>
  <div class="info">Total: <span id="total">0</span></div>

  <textarea id="message" placeholder="Digite sua mensagem"></textarea>

  <button onclick="send()">Enviar</button>
</div>

<!-- ORDEM CORRETA -->
<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
