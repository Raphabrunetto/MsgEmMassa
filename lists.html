<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciar Listas de Telefones</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a class="back-button" href="index.html">← Voltar para envio</a>
    <div class="panel-header small">
      <div class="icon-circle">📋</div>
      <h1>Gerenciar listas</h1>
      <p class="subtitle">Organize seus contatos em listas reutilizáveis.</p>
    </div>

    <div class="field">
      <input type="text" id="listName" placeholder="Nome da lista">
    </div>
    <div class="field">
      <textarea id="listNumbers" placeholder="Números (um por linha)"></textarea>
    </div>

    <button id="saveListBtn" class="primary" onclick="saveList()">Salvar lista</button>
    <div class="info" id="listMessage"></div>

    <div id="listsContainer"></div>
    <div class="info total-lists">Total de listas: <span id="listCount">0</span></div>
  </div>

  <script src="lists.js"></script>
</body>
</html>
